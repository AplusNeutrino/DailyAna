name: Ravenis Core - History Publish

on:
  workflow_run:
    workflows:
      - Ravenis Core - Daily Intelligence
      - Ravenis Core - AI Digest Daily
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ravenis-history-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install publisher dependencies
        run: python -m pip install boto3

      - name: Build and validate public history
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: python tools/build_history_index.py --retention-days 30 --output-dir docs/history --upload-key history/manifest.json --release-prefix history/releases --pointer-key history/current.json

      - name: Trigger Neutriverse Ravenis deployment
        env:
          GH_TOKEN: ${{ secrets.NEUTRIVERSE_DISPATCH_TOKEN }}
        run: >-
          gh api repos/AplusNeutrino/My_Blog/dispatches
          --method POST
          -f event_type=ravenis-history-published
          -f client_payload[producer_run_id]=${{ github.run_id }}
