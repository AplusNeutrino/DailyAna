name: Ravenis Core - Daily Intelligence

on:
  schedule:
    # GitHub cron uses UTC; the mapping below is explicit and stable.
    - cron: "0 22 * * *"  # 06:00 Beijing -> A/work
    - cron: "15 6 * * *"  # 14:15 Beijing -> B/work
    - cron: "10 10 * * *" # 18:10 Beijing -> C/relax
  workflow_dispatch:
    inputs:
      slot:
        description: Delivery slot
        required: true
        type: choice
        options: [A, B, C]
      profile:
        description: Runtime profile
        required: true
        type: choice
        options: [work, relax]

concurrency:
  group: ravenis-producer-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Resolve explicit run context
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_SLOT: ${{ inputs.slot }}
          INPUT_PROFILE: ${{ inputs.profile }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            slot="$INPUT_SLOT"
            profile="$INPUT_PROFILE"
          else
            case "$SCHEDULE" in
              "0 22 * * *") slot=A; profile=work ;;
              "15 6 * * *") slot=B; profile=work ;;
              "10 10 * * *") slot=C; profile=relax ;;
              *) echo "Unknown schedule: $SCHEDULE" >&2; exit 2 ;;
            esac
          fi
          echo "RAVENIS_SLOT=$slot" >> "$GITHUB_ENV"
          echo "DAILYANA_PROFILE=$profile" >> "$GITHUB_ENV"
          echo "slot=$slot profile=$profile" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Checkout private runtime config
        uses: actions/checkout@v6
        with:
          repository: AplusNeutrino/Ravenis-Secrets
          token: ${{ secrets.RAVENIS_SECRETS_TOKEN }}
          path: .ravenis-secrets

      - name: Validate runtime configuration
        env:
          RAVENIS_PRIVATE_CONFIG: ${{ github.workspace }}/.ravenis-secrets/config/config.yaml
          RAVENIS_PRIVATE_CONFIG_DIR: ${{ github.workspace }}/.ravenis-secrets/config
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
        run: uv run python tools/validate_runtime.py --profile "$DAILYANA_PROFILE" --slot "$RAVENIS_SLOT" --check-env

      - name: Run crawler, archive and notify
        env:
          RAVENIS_PRIVATE_CONFIG: ${{ github.workspace }}/.ravenis-secrets/config/config.yaml
          RAVENIS_PRIVATE_CONFIG_DIR: ${{ github.workspace }}/.ravenis-secrets/config
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          INTELLIGENCE_PUSH_ENABLED: ${{ secrets.INTELLIGENCE_PUSH_ENABLED }}
          GITHUB_ACTIONS: "true"
        run: uv run python -m trendradar
