name: Test AI Secrets

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Optional model override, e.g. deepseek/deepseek-v4-flash"
        required: false
        default: ""

jobs:
  test-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check required secrets
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ inputs.model || secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
        run: |
          test -n "$AI_API_KEY" || { echo "AI_API_KEY is missing"; exit 1; }
          test -n "$AI_MODEL" || { echo "AI_MODEL is missing"; exit 1; }
          echo "AI_MODEL=$AI_MODEL"
          if [ -n "$AI_API_BASE" ]; then
            echo "AI_API_BASE=$AI_API_BASE"
          else
            echo "AI_API_BASE is empty; using provider default when possible"
          fi

      - name: Test AI endpoint
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ inputs.model || secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          raw_model = os.environ["AI_MODEL"].strip()
          key = os.environ["AI_API_KEY"]
          configured_base = os.environ.get("AI_API_BASE", "").strip().rstrip("/")

          if raw_model.startswith("deepseek/"):
              base = configured_base or "https://api.deepseek.com"
              api_model = raw_model.split("/", 1)[1]
          elif raw_model.startswith("openai/"):
              if not configured_base:
                  raise SystemExit("AI_API_BASE is required for openai/ custom-compatible models")
              base = configured_base
              api_model = raw_model.split("/", 1)[1]
          else:
              base = configured_base or "https://api.deepseek.com"
              api_model = raw_model

          print("resolved_base=" + base)
          print("api_model=" + api_model)

          def request_json(path, payload=None, timeout=120):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  base + path,
                  data=data,
                  headers={
                      "Authorization": "Bearer " + key,
                      "Content-Type": "application/json",
                      "User-Agent": "DailyAna/GitHubActionsAISecretTest",
                  },
                  method="GET" if payload is None else "POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      body = resp.read().decode("utf-8", errors="replace")
                      print(path + "_http_status=" + str(resp.status))
                      print(body[:2000])
                      return resp.status, body
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(path + "_http_status=" + str(e.code))
                  print(body[:2000])
                  raise

          request_json("/models", timeout=60)
          request_json(
              "/chat/completions",
              {
                  "model": api_model,
                  "messages": [{"role": "user", "content": "Reply with exactly: ok"}],
                  "temperature": 0,
                  "max_tokens": 16,
              },
              timeout=180,
          )
          PY
