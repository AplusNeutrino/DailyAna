name: Ravenis Core Maintenance

# ✅ 维护工具：手动运行后会清理历史 workflow runs
# ✅ Maintenance: manually run this workflow to clean historical workflow runs
#
# 📌 操作方法 / How to use:
#   1. 点击 "Run workflow" 按钮 / Click "Run workflow" button

on:
  workflow_dispatch:

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete all workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_by_state_pattern: "ALL"
          delete_run_by_conclusion_pattern: "ALL"
