name: Turn Off Ravenis Core

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  turn-off:
    runs-on: ubuntu-latest
    steps:
      - name: Disable production schedules
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow disable crawler.yml --repo "${{ github.repository }}"
          gh workflow disable ai-digest-daily.yml --repo "${{ github.repository }}"
          echo "Ravenis Core producer schedules have been turned off."
