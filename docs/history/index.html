<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ravenis Core 历史新闻</title>
  <style>
    :root { color-scheme: light; --bg:#f6f7fb; --panel:#fff; --line:#d9e0ea; --text:#172033; --muted:#68758a; --accent:#155eef; --ok:#067647; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center; gap:16px; padding:16px 22px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:2; }
    h1 { font-size:18px; margin:0; }
    main { padding:20px; max-width:1180px; margin:0 auto; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:14px; }
    .toolbar { display:grid; grid-template-columns: minmax(260px, 1fr) 160px 160px 120px; gap:10px; align-items:end; }
    label { display:block; color:var(--muted); font-size:12px; margin-bottom:4px; }
    input, select, button { width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 10px; background:#fff; color:var(--text); font:inherit; }
    button { cursor:pointer; background:var(--accent); color:#fff; border-color:var(--accent); }
    .muted { color:var(--muted); }
    .stats { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .pill { display:inline-flex; padding:2px 8px; border-radius:999px; background:#edf2f7; color:#42526b; font-size:12px; }
    .pill.rss { background:#fff4e5; color:#93370d; }
    .pill.hotlist { background:#e8efff; color:#003eb3; }
    .item { display:grid; gap:6px; padding:13px 0; border-bottom:1px solid var(--line); }
    .item:last-child { border-bottom:0; }
    .item-title { color:#0f1728; font-weight:700; text-decoration:none; }
    .item-title:hover { color:var(--accent); }
    .meta { display:flex; flex-wrap:wrap; gap:8px; color:var(--muted); font-size:12px; }
    .empty { padding:28px; text-align:center; color:var(--muted); }
    @media (max-width: 760px) { header { align-items:flex-start; flex-direction:column; } .toolbar { grid-template-columns:1fr; } main { padding:12px; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Ravenis Core 历史新闻</h1>
      <div class="muted">搜索最近 30 天归档索引，不包含密钥和正文。</div>
    </div>
    <a class="muted" href="../">配置文档</a>
  </header>
  <main>
    <section class="panel">
      <div class="toolbar">
        <div>
          <label for="q">关键词</label>
          <input id="q" placeholder="搜索标题、来源、日期" autofocus />
        </div>
        <div>
          <label for="type">类型</label>
          <select id="type">
            <option value="">全部</option>
            <option value="hotlist">热榜</option>
            <option value="rss">RSS</option>
          </select>
        </div>
        <div>
          <label for="source">来源</label>
          <select id="source"><option value="">全部来源</option></select>
        </div>
        <div>
          <label for="limit">数量</label>
          <select id="limit">
            <option>50</option>
            <option>100</option>
            <option>200</option>
            <option>500</option>
          </select>
        </div>
      </div>
    </section>
    <section class="panel stats">
      <span id="status" class="muted">正在加载索引...</span>
      <span id="generated" class="pill"></span>
      <span id="total" class="pill"></span>
    </section>
    <section class="panel" id="results"></section>
  </main>
  <script>
    const INDEX_URL = './history-index.json';
    let index = {items: [], sources: []};
    let items = [];

    const $ = id => document.getElementById(id);
    const esc = v => String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

    async function loadIndex() {
      try {
        const res = await fetch(INDEX_URL, {cache: 'no-store'});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        index = await res.json();
        items = index.items || [];
        $('status').textContent = index.note || '索引已加载';
        $('generated').textContent = index.generated_at ? `生成 ${index.generated_at}` : '';
        $('total').textContent = `总计 ${items.length}`;
        renderSources();
        render();
      } catch (err) {
        $('status').textContent = `索引加载失败：${err.message}`;
        $('results').innerHTML = '<div class="empty">还没有可搜索的历史索引。配置 R2 secrets 后，等待下一次 Actions 运行。</div>';
      }
    }

    function renderSources() {
      const seen = new Map();
      for (const item of items) {
        const key = `${item.type}:${item.source_id}`;
        if (!seen.has(key)) seen.set(key, item.source || item.source_id || key);
      }
      $('source').innerHTML = '<option value="">全部来源</option>' + Array.from(seen.entries())
        .sort((a,b) => a[1].localeCompare(b[1], 'zh-CN'))
        .map(([key, name]) => `<option value="${esc(key)}">${esc(name)}</option>`)
        .join('');
    }

    function render() {
      const q = $('q').value.trim().toLowerCase();
      const type = $('type').value;
      const source = $('source').value;
      const limit = Number($('limit').value || 50);
      let result = items.filter(item => {
        if (type && item.type !== type) return false;
        if (source && `${item.type}:${item.source_id}` !== source) return false;
        if (q && !(item.search_text || '').includes(q)) return false;
        return true;
      }).slice(0, limit);
      $('status').textContent = `显示 ${result.length} 条`;
      if (!result.length) {
        $('results').innerHTML = '<div class="empty">没有匹配结果。</div>';
        return;
      }
      $('results').innerHTML = result.map(item => `
        <article class="item">
          <a class="item-title" href="${esc(item.url || '#')}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a>
          <div class="meta">
            <span class="pill ${esc(item.type)}">${item.type === 'rss' ? 'RSS' : '热榜'}</span>
            <span>${esc(item.source || item.source_id)}</span>
            <span>${esc(item.date)}</span>
            ${item.published_at ? `<span>${esc(item.published_at)}</span>` : ''}
          </div>
        </article>
      `).join('');
    }

    ['q', 'type', 'source', 'limit'].forEach(id => $(id).addEventListener('input', render));
    loadIndex();
  </script>
</body>
</html>
