name: Turn Off Ravenis Core

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  turn-off:
    runs-on: ubuntu-latest
    steps:
      - name: Disable scheduled crawler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow disable crawler.yml --repo "${{ github.repository }}"
          gh workflow disable crawler-relax.yml --repo "${{ github.repository }}"
          echo "Ravenis Core scheduled crawlers have been turned off."
