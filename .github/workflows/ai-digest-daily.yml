name: Ravenis Core - AI Digest Daily

on:
  schedule:
    - cron: "0 2 * * *" # 10:00 Beijing
  workflow_dispatch:

concurrency:
  group: ravenis-producer-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Checkout private runtime config
        uses: actions/checkout@v6
        with:
          repository: AplusNeutrino/Ravenis-Secrets
          token: ${{ secrets.RAVENIS_SECRETS_TOKEN }}
          path: .ravenis-secrets

      - name: Fetch, archive and notify
        env:
          RAVENIS_PRIVATE_CONFIG: ${{ github.workspace }}/.ravenis-secrets/config/config.yaml
          RAVENIS_PRIVATE_CONFIG_DIR: ${{ github.workspace }}/.ravenis-secrets/config
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          RAVENIS_SLOT: DIGEST
          DAILYANA_PROFILE: work
          GITHUB_ACTIONS: "true"
        run: uv run python tools/fetch_ai_digest_daily.py --json-snapshot
