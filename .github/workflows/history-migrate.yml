name: Ravenis Core - History Migration

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type MIGRATE to generate and verify public projections; no legacy objects are deleted
        required: true
        type: string

permissions:
  contents: read

jobs:
  migrate:
    if: inputs.confirmation == 'MIGRATE'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install migration dependencies
        run: python -m pip install boto3
      - name: Build strict projections and verify SHA-256
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: python tools/migrate_legacy_history.py --retention-days 30
      - name: Upload migration manifest
        uses: actions/upload-artifact@v7
        with:
          name: public-history-migration-manifest
          path: output/migration-public-history-manifest.json
