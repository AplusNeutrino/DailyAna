name: Test AI Secrets

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Optional model override, e.g. openai/gpt-5.5-openai-compact"
        required: false
        default: ""

jobs:
  test-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check required secrets
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ inputs.model || secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
        run: |
          test -n "$AI_API_KEY" || { echo "AI_API_KEY is missing"; exit 1; }
          test -n "$AI_MODEL" || { echo "AI_MODEL is missing"; exit 1; }
          test -n "$AI_API_BASE" || { echo "AI_API_BASE is missing"; exit 1; }
          echo "AI_MODEL=$AI_MODEL"
          echo "AI_API_BASE=$AI_API_BASE"

      - name: Test models endpoint
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
        run: |
          set +e
          curl -sS -L \
            -H "Authorization: Bearer $AI_API_KEY" \
            -H "Content-Type: application/json" \
            "$AI_API_BASE/models" \
            -o models-response.json \
            -w "models_http_status=%{http_code}\n"
          status=$?
          set -e
          echo "curl_exit=$status"
          python - <<'PY'
          from pathlib import Path
          text = Path("models-response.json").read_text(encoding="utf-8", errors="replace")
          print(text[:1200])
          PY

      - name: Test minimal chat completion
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ inputs.model || secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          base = os.environ["AI_API_BASE"].rstrip("/")
          model = os.environ["AI_MODEL"]
          key = os.environ["AI_API_KEY"]

          payload = {
              "model": model.replace("openai/", "", 1),
              "messages": [
                  {"role": "user", "content": "Reply with exactly: ok"}
              ],
              "temperature": 0,
              "max_tokens": 16,
          }

          req = urllib.request.Request(
              base + "/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": "Bearer " + key,
                  "Content-Type": "application/json",
                  "User-Agent": "Mozilla/5.0 GitHubActionsAISecretTest",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=180) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
                  print("chat_http_status=" + str(resp.status))
                  print(body[:2000])
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print("chat_http_status=" + str(e.code))
              print(body[:2000])
              raise SystemExit(1)
          PY
